<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>🎮 DT小龙虾游戏大厅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(135deg,#0a0a1a,#1a1a3e,#0a1628);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0;padding:20px;
}
h1{
  font-size:32px;margin:20px 0 8px;letter-spacing:3px;
  background:linear-gradient(90deg,#00d4ff,#e94560,#ffd700,#00ff88);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.subtitle{color:#888;font-size:14px;margin-bottom:25px;}
.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:800px;width:100%;}
.card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:20px;transition:all 0.3s;cursor:pointer;
  text-decoration:none;color:inherit;display:block;
}
.card:hover{
  border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.05);
  transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,212,255,0.15);
}
.card-emoji{font-size:40px;margin-bottom:10px;}
.card-title{font-size:20px;font-weight:bold;margin-bottom:6px;}
.card-desc{font-size:13px;color:#888;line-height:1.5;}
.card-tag{
  display:inline-block;margin-top:8px;padding:2px 10px;
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  border-radius:12px;font-size:11px;color:#00d4ff;
}
.footer{margin-top:40px;color:#555;font-size:12px;text-align:center;}
</style>
</head>
<body>

<h1>🎮 DT小龙虾游戏大厅</h1>

</html>
